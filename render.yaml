services:
  - type: worker
    name: nocoin-discord-bot
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: BOT_OWNER_IDS
        sync: false
      - key: AUTO_SYNC_COMMANDS
        value: "true"
      - key: SYNC_SCOPE
        value: global
      - key: STARTING_BALANCE
        value: "100000"
      - key: ECONOMY_MULTIPLIER
        value: "100"
      - key: FISHING_COOLDOWN_SECONDS
        value: "60"
      - key: BEGGING_COOLDOWN_MINUTES
        value: "5"
      - key: STORAGE_BACKEND
        value: firestore
      - key: FIRESTORE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
